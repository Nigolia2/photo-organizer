name: Build & Release

# Se déclenche à chaque tag de version poussé (ex: v1.0.0).
# Déclenchement manuel : git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build PhotoOrganizer.exe
        shell: pwsh
        run: .\build\build_windows.ps1

      - name: Upload de l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoOrganizer-windows
          path: dist/PhotoOrganizer.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Tkinter (non fourni par défaut par setup-python sur Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build le paquet .deb
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # github.ref_name est le nom du tag (ex: v1.0.0) — on retire le "v" pour
          # obtenir un numéro de version Debian valide (ex: 1.0.0).
          export VERSION="${VERSION#v}"
          bash build/build_linux.sh

      - name: Renommer l'artefact pour la release (nom stable, sans version/arch)
        run: cp dist/*.deb dist/photo-organizer.deb

      - name: Upload de l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoOrganizer-linux
          path: dist/photo-organizer.deb
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer create-dmg
        run: brew install create-dmg

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build PhotoOrganizer.dmg
        run: bash build/build_macos.sh

      - name: Upload de l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoOrganizer-macos
          path: dist/PhotoOrganizer.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger tous les artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Créer la GitHub Release et y attacher les 3 artefacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PhotoOrganizer-windows/PhotoOrganizer.exe
            artifacts/PhotoOrganizer-linux/photo-organizer.deb
            artifacts/PhotoOrganizer-macos/PhotoOrganizer.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
